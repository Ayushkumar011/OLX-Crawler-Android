kind = "web"
previewPath = "/"
title = "GlassCrawler"
version = "1.0.0"
id = "artifacts/glass-crawler"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19750
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/glass-crawler run dev"

[services.env]
PORT = "19750"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/glass-crawler", "run", "build"]
publicDir = "artifacts/glass-crawler/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
